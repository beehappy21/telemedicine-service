services:
  telemedicine:
    build: .
    ports:
      - "3001:3001"
    environment:
      DATABASE_URL: postgresql://postgres:postgres@postgres:5432/telemedicine
      DAILY_API_KEY: ${DAILY_API_KEY}
      SERVICE_TOKEN: ${SERVICE_TOKEN}
      EMR_API_TOKEN: ${EMR_API_TOKEN}
      EMR_CORE_BASE_URL: ${EMR_CORE_BASE_URL:-http://localhost:3000}
      EMR_CORE_API_TOKEN: ${EMR_CORE_API_TOKEN:-}
      NOTIFY_WEBHOOK_URL: ${NOTIFY_WEBHOOK_URL:-}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: telemedicine
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./database/migrations:/docker-entrypoint-initdb.d
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    ports:
      - "5432:5432"

volumes:
  pgdata:
