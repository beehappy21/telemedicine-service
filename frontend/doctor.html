<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>ห้องตรวจทางออนไลน์</title>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #f1f5f9; min-height: 100vh; display: flex; align-items: center; justify-content: center; }
    .card { background: #fff; border-radius: 12px; box-shadow: 0 4px 20px rgba(0,0,0,.08); padding: 32px; width: 100%; max-width: 520px; }
    h1 { font-size: 1.4rem; color: #1e293b; margin-bottom: 20px; }
    .section-title { font-size: .75rem; font-weight: 700; text-transform: uppercase; letter-spacing: .05em; color: #94a3b8; margin: 16px 0 8px; }
    .info-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid #e2e8f0; font-size: .95rem; }
    .info-row:last-of-type { border-bottom: none; }
    .label { color: #64748b; }
    .value { font-weight: 600; color: #1e293b; max-width: 60%; text-align: right; }
    .complaint { background: #f8fafc; border-left: 3px solid #2563eb; padding: 10px 14px; border-radius: 4px; font-size: .9rem; color: #334155; margin: 8px 0 16px; }
    .btn { width: 100%; padding: 14px; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-top: 10px; transition: opacity .15s; }
    .btn:disabled { opacity: .5; cursor: not-allowed; }
    .btn-start { background: #16a34a; color: #fff; }
    .btn-start:hover:not(:disabled) { background: #15803d; }
    .btn-end { background: #dc2626; color: #fff; display: none; }
    .btn-end:hover:not(:disabled) { background: #b91c1c; }
    .call-frame { display: none; width: 100%; height: 520px; border: none; border-radius: 10px; margin-top: 20px; }
    .error { background: #fee2e2; color: #b91c1c; padding: 12px 16px; border-radius: 8px; font-size: .9rem; margin-top: 16px; }
    #loading { text-align: center; color: #64748b; padding: 40px; }
  </style>
</head>
<body>
  <div class="card" id="card">
    <div id="loading">กำลังโหลดข้อมูล...</div>

    <div id="session-info" style="display:none">
      <h1>ห้องตรวจทางออนไลน์</h1>

      <div class="section-title">ข้อมูลผู้ป่วย</div>
      <div class="info-row">
        <span class="label">รหัสผู้ป่วย (HN)</span>
        <span class="value" id="patient-id">—</span>
      </div>
      <div class="info-row">
        <span class="label">เวลานัด</span>
        <span class="value" id="scheduled-time">—</span>
      </div>

      <div class="section-title">อาการสำคัญ</div>
      <div class="complaint" id="chief-complaint">—</div>

      <button id="btn-start" class="btn btn-start">เริ่มการพบแพทย์</button>
      <button id="btn-end"   class="btn btn-end">จบการพบแพทย์</button>
    </div>

    <div id="error-box" style="display:none" class="error"></div>
  </div>

  <iframe id="call-frame" class="call-frame"
    allow="camera; microphone; autoplay; display-capture; fullscreen"></iframe>

  <script>
    const params         = new URLSearchParams(location.search);
    const sessionId      = params.get('sessionId');
    const bearerToken    = params.get('token');
    const emrCoreBaseUrl = params.get('emrCoreBaseUrl') ?? '';

    const headers = {
      'Content-Type':  'application/json',
      'Authorization': `Bearer ${bearerToken}`,
    };

    let currentSession = null;

    async function init() {
      if (!sessionId || !bearerToken) {
        showError('ลิงก์ไม่ถูกต้อง กรุณาติดต่อผู้ดูแลระบบ');
        return;
      }
      try {
        currentSession = await apiFetch(`/api/sessions/${sessionId}`);
        renderSession(currentSession);
        document.getElementById('btn-start').onclick = startCall;
        document.getElementById('btn-end').onclick   = endCall;
      } catch (e) {
        showError('ไม่สามารถโหลดข้อมูลผู้ป่วยได้: ' + e.message);
      }
    }

    function renderSession(session) {
      document.getElementById('patient-id').textContent    = session.emr_patient_id;
      document.getElementById('scheduled-time').textContent = session.scheduled_start_at
        ? new Date(session.scheduled_start_at).toLocaleString('th-TH', { dateStyle: 'medium', timeStyle: 'short' })
        : 'ไม่ระบุเวลา';
      document.getElementById('chief-complaint').textContent =
        session.chief_complaint ?? 'ไม่ระบุอาการ';

      document.getElementById('loading').style.display = 'none';
      document.getElementById('session-info').style.display = 'block';
    }

    async function startCall() {
      const btn = document.getElementById('btn-start');
      btn.disabled    = true;
      btn.textContent = 'กำลังเชื่อมต่อ...';
      try {
        await apiFetch(`/api/sessions/${sessionId}/status`, {
          method: 'PATCH',
          body:   JSON.stringify({ status: 'in_progress' }),
        });
        const { token } = await apiFetch(
          `/api/sessions/${sessionId}/join?userId=${currentSession.emr_practitioner_id}&role=doctor`
        );
        const frame = document.getElementById('call-frame');
        frame.src          = `${currentSession.provider_meeting_url}?t=${token}`;
        frame.style.display = 'block';
        btn.style.display   = 'none';
        document.getElementById('btn-end').style.display = 'block';
      } catch (e) {
        showError('ไม่สามารถเริ่มการพบแพทย์ได้: ' + e.message);
        btn.disabled    = false;
        btn.textContent = 'เริ่มการพบแพทย์';
      }
    }

    async function endCall() {
      const btn = document.getElementById('btn-end');
      btn.disabled    = true;
      btn.textContent = 'กำลังบันทึก...';
      try {
        const updated = await apiFetch(`/api/sessions/${sessionId}/status`, {
          method: 'PATCH',
          body:   JSON.stringify({ status: 'completed' }),
        });
        // Redirect to SOAP note in emr-core (use encounter id if already linked)
        const encounterId = updated.emr_encounter_id;
        if (emrCoreBaseUrl && encounterId) {
          location.href = `${emrCoreBaseUrl}/encounters/${encounterId}/soap`;
        } else if (emrCoreBaseUrl) {
          location.href = `${emrCoreBaseUrl}/patients/${updated.emr_patient_id}`;
        }
        // If no emrCoreBaseUrl, just show completed state
        document.getElementById('call-frame').style.display = 'none';
        btn.style.display = 'none';
        showError('การพบแพทย์เสร็จสิ้น');
        document.getElementById('error-box').style.background = '#dcfce7';
        document.getElementById('error-box').style.color      = '#15803d';
      } catch (e) {
        showError('ไม่สามารถบันทึกการสิ้นสุดการพบแพทย์ได้: ' + e.message);
        btn.disabled    = false;
        btn.textContent = 'จบการพบแพทย์';
      }
    }

    async function apiFetch(url, options = {}) {
      const res = await fetch(url, { ...options, headers: { ...headers, ...(options.headers ?? {}) } });
      if (!res.ok) {
        const body = await res.json().catch(() => ({}));
        throw new Error(body.error ?? res.statusText);
      }
      return res.json();
    }

    function showError(msg) {
      document.getElementById('loading').style.display = 'none';
      const box = document.getElementById('error-box');
      box.textContent   = msg;
      box.style.display = 'block';
    }

    init();
  </script>
</body>
</html>
